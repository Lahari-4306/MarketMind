version: '3.8'

services:
  backend:
    build: ./backend
    container_name: marketmind-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/marketmind.db
      - SECRET_KEY=${SECRET_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: marketmind-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
